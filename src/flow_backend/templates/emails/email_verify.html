<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>{{ subject or "邮箱验证" }}</title>
  </head>
  <body style="margin:0;padding:0;background:#f4f5f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,'PingFang SC','Microsoft YaHei',sans-serif;color:#1f2329;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="padding:24px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:560px;background:#ffffff;border-radius:12px;box-shadow:0 2px 12px rgba(15,23,42,0.06);overflow:hidden;">
            <tr>
              <td style="padding:28px 32px 8px;">
                <div style="font-size:18px;font-weight:600;color:#0f172a;">{{ brand_name or "心流（Flow）" }}</div>
                <div style="margin-top:4px;font-size:13px;color:#64748b;">邮箱绑定验证码</div>
              </td>
            </tr>
            <tr>
              <td style="padding:8px 32px 0;">
                <p style="margin:16px 0 8px;font-size:15px;line-height:1.7;color:#1f2937;">
                  你好，<strong>{{ username }}</strong>：
                </p>
                <p style="margin:0 0 8px;font-size:14px;line-height:1.7;color:#374151;">
                  正在为你的账号绑定邮箱 <strong>{{ email }}</strong>，验证码如下：
                </p>
                <div style="margin:20px 0;padding:18px;background:#0f172a;border-radius:10px;text-align:center;">
                  <div style="font-size:32px;font-weight:700;letter-spacing:10px;color:#fbbf24;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;">
                    {{ code }}
                  </div>
                </div>
                <div style="padding:14px 16px;background:#f1f5f9;border-radius:8px;font-size:13px;line-height:1.6;color:#475569;">
                  · 验证码 <strong>{{ ttl_minutes }} 分钟</strong>内有效，只能使用一次。<br />
                  · 如果不是你本人发起的操作，请忽略本邮件。
                </div>
              </td>
            </tr>
            <tr>
              <td style="padding:16px 32px 28px;">
                <hr style="border:none;border-top:1px solid #e5e7eb;margin:16px 0;" />
                <div style="font-size:12px;color:#94a3b8;line-height:1.6;">
                  本邮件由 {{ brand_name or "心流" }} 自动发送，请勿直接回复。
                </div>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
