<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>{{ subject or "重置密码" }}</title>
  </head>
  <body style="margin:0;padding:0;background:#f4f5f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,'PingFang SC','Microsoft YaHei',sans-serif;color:#1f2329;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="padding:24px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:560px;background:#ffffff;border-radius:12px;box-shadow:0 2px 12px rgba(15,23,42,0.06);overflow:hidden;">
            <tr>
              <td style="padding:28px 32px 8px;">
                <div style="font-size:18px;font-weight:600;color:#0f172a;">{{ brand_name or "心流（Flow）" }}</div>
                <div style="margin-top:4px;font-size:13px;color:#64748b;">重置账号密码</div>
              </td>
            </tr>
            <tr>
              <td style="padding:8px 32px 0;">
                <p style="margin:16px 0 8px;font-size:15px;line-height:1.7;color:#1f2937;">
                  你好，<strong>{{ username }}</strong>：
                </p>
                <p style="margin:0 0 16px;font-size:14px;line-height:1.7;color:#374151;">
                  我们收到了你账户的密码重置请求。点击下方按钮即可设置新密码：
                </p>
                <p style="margin:24px 0;text-align:center;">
                  <a href="{{ reset_url }}" style="display:inline-block;padding:12px 28px;background:#2563eb;color:#ffffff;text-decoration:none;border-radius:8px;font-weight:600;font-size:14px;">
                    重置密码
                  </a>
                </p>
                <p style="margin:0 0 8px;font-size:13px;line-height:1.7;color:#64748b;">
                  如果按钮无法点击，请复制以下链接到浏览器：
                </p>
                <p style="margin:0 0 16px;font-size:13px;line-height:1.7;color:#2563eb;word-break:break-all;">
                  {{ reset_url }}
                </p>
                <div style="margin:24px 0 4px;padding:14px 16px;background:#f1f5f9;border-radius:8px;font-size:13px;line-height:1.6;color:#475569;">
                  · 此链接将在 <strong>{{ ttl_minutes }} 分钟</strong> 内有效，只能使用一次。<br />
                  · 如果不是你本人发起的请求，请忽略本邮件，你的密码不会发生改变。
                </div>
              </td>
            </tr>
            <tr>
              <td style="padding:16px 32px 28px;">
                <hr style="border:none;border-top:1px solid #e5e7eb;margin:16px 0;" />
                <div style="font-size:12px;color:#94a3b8;line-height:1.6;">
                  本邮件由 {{ brand_name or "心流" }} 自动发送，请勿直接回复。<br />
                  如有疑问，请联系站点管理员。
                </div>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
